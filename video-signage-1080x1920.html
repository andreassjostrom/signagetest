<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080, initial-scale=1.0">
<title>Video Signage – 1080×1920</title>
<style>
  * { margin: 0; padding: 0; }
  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: #000;
  }
  video, img {
    width: 1080px;
    height: 1920px;
    display: block;
    object-fit: fill;
  }
  #image { display: none; }
  #player { display: none; }
</style>
</head>
<body>
  <video id="player" autoplay muted playsinline></video>
  <img id="image" src="" alt="">

  <script>
    var MEDIA = {
      video: 'content.mp4',
      image: 'content.jpg'
    };

    var player = document.getElementById('player');
    var image = document.getElementById('image');

    var currentType = null;
    var currentTag = null;
    var pendingSwap = null;

    function headRequest(url) {
      return fetch(url, { method: 'HEAD', cache: 'no-store' })
        .then(function(resp) {
          if (!resp.ok) return null;
          // content-length is stable across CDN edges; etag can vary
          var tag = resp.headers.get('content-length')
            || resp.headers.get('last-modified')
            || resp.headers.get('etag');
          return tag;
        })
        .catch(function() { return null; });
    }

    function showVideo(bustCache) {
      var src = MEDIA.video + (bustCache ? '?t=' + Date.now() : '');
      image.style.display = 'none';
      image.src = '';
      player.src = src;
      player.style.display = 'block';
      player.play();
    }

    function showImage(bustCache) {
      var src = MEDIA.image + (bustCache ? '?t=' + Date.now() : '');
      player.style.display = 'none';
      player.pause();
      player.removeAttribute('src');
      image.src = src;
      image.style.display = 'block';
    }

    function checkForContent() {
      Promise.all([
        headRequest(MEDIA.image),
        headRequest(MEDIA.video)
      ]).then(function(results) {
        var imgTag = results[0];
        var vidTag = results[1];

        var useType = imgTag ? 'image' : (vidTag ? 'video' : null);
        var useTag = imgTag || vidTag;

        if (!useType) return;

        // First load
        if (currentType === null) {
          currentType = useType;
          currentTag = useTag;
          if (useType === 'image') showImage(false);
          else showVideo(false);
          return;
        }

        // Same type, same file — do nothing
        if (useType === currentType && useTag === currentTag) return;

        // Type changed to image, or image file updated
        if (useType === 'image' && (currentType !== 'image' || useTag !== currentTag)) {
          currentType = 'image';
          currentTag = useTag;
          showImage(true);
          return;
        }

        // Image removed, video available
        if (currentType === 'image' && useType === 'video') {
          currentType = 'video';
          currentTag = useTag;
          showVideo(true);
          return;
        }

        // Video file updated — wait for loop end
        if (useType === 'video' && currentType === 'video' && useTag !== currentTag) {
          pendingSwap = { tag: useTag };
        }
      });
    }

    player.loop = false;
    player.addEventListener('ended', function() {
      if (pendingSwap) {
        currentTag = pendingSwap.tag;
        pendingSwap = null;
        showVideo(true);
      } else {
        player.play();
      }
    });

    setTimeout(checkForContent, 1000);
    setInterval(checkForContent, 30000);
  </script>
</body>
</html>
