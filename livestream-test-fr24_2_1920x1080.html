<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, initial-scale=1.0">
<title>Live Stream Signage – 1920×1080</title>
<style>
  * { margin: 0; padding: 0; }
  html, body {
    width: 1920px;
    height: 1080px;
    overflow: hidden;
    background: #000;
  }
  iframe {
    width: 1920px;
    height: 1080px;
    border: none;
    display: block;
  }
</style>
</head>
<body>
  <iframe
    src="https://www.youtube.com/embed/live_stream?channel=UCQfwfsi5VrQ8yKZ-UWmAEFg&autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&showinfo=0&iv_load_policy=3&disablekb=1&fs=0"
    allow="autoplay; encrypted-media"
    allowfullscreen>
  </iframe>
</body>
</html>
